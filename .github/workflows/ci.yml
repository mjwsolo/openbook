name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.8", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Check syntax
        run: python -m py_compile openbook.py

      - name: Check imports work
        run: python -c "from openbook import analyze_prompts, determine_archetype, generate_tips, generate_html; print('imports OK')"

      - name: Check no personal data
        run: |
          ! grep -n "marcsolomon\|/Users/.*solomon\|sk-\|ghp_\|password" openbook.py || \
            (echo "FAIL: Found potential secrets or personal data" && exit 1)

      - name: Check version exists
        run: python -c "from openbook import __version__; print(f'v{__version__}')"
