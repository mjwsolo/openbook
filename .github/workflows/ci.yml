name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.8", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Check syntax
        run: python -m py_compile openbook.py

      - name: Check imports work
        run: python -c "from openbook import analyze_prompts, determine_archetype, generate_tips, generate_html; print('imports OK')"

      - name: Check version exists
        run: python -c "from openbook import __version__; print(__version__)"

      - name: Check no personal data
        shell: python
        run: |
          import re, sys
          for f in ["openbook.py", "README.md", "pyproject.toml"]:
              text = open(f).read()
              for pat in [r"marcsolomon", r"/Users/.*solomon", r"sk-[a-zA-Z0-9]{20}", r"ghp_[a-zA-Z0-9]{20}"]:
                  m = re.search(pat, text)
                  if m:
                      print("FAIL: " + f + " contains " + m.group())
                      sys.exit(1)
          print("No personal data found")
